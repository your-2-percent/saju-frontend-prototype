  <script type="text/javascript">
    // Single Page Apps for GitHub Pages
    // https://github.com/rafrex/spa-github-pages

    // ----------------------------------------------------------------------
    // This script checks to see if a redirect is present in the query string
    // and converts it back into the correct url and adds it to the
    // browser's history using window.history.replaceState(...),
    // which won't cause the browser to attempt to load the new url.
    // When the single page app is loaded further down in this file,
    // the correct url will be waiting in the browser's history for
    // the single page app to route accordingly.
    (function (l) {
      if (l.search) {
        var q = {};
        l.search.slice(1).split('&').forEach(function (v) {
          var a = v.split('=');
          q[a[0]] = a.slice(1).join('=').replace(/~and~/g, '&');
        });
        if (q.p !== undefined) {
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + (q.p || '') +
            (q.q ? ('?' + q.q) : '') +
            l.hash
          );
        }
      }
    }(window.location))
  </script>
  <!-- End Single Page Apps for GitHub Pages -->
  <script type="text/javascript">
    (function () {
      var repoName = "saju-frontend-prototype";
      var l = window.location;
      var isGitHubPagesHost = /\.github\.io$/i.test(l.hostname);
      var pathParts = (l.pathname || "/").split("/");
      var repoBase = isGitHubPagesHost && pathParts[1] === repoName ? "/" + repoName : "";
      var routePath = l.pathname.indexOf(repoBase) === 0 ? l.pathname.slice(repoBase.length) : l.pathname;

      if (!routePath || routePath === "") routePath = "/";
      if (!routePath.startsWith("/")) routePath = "/" + routePath;

      var hasHashRoute = /^#\//.test(l.hash);
      var currentHashRoute = hasHashRoute ? l.hash.slice(1) : "";
      var shouldNormalizeHashRoute = hasHashRoute && routePath !== "/";
      var shouldConvertPathRoute = !hasHashRoute && routePath !== "/";

      if (!shouldNormalizeHashRoute && !shouldConvertPathRoute) return;

      var nextRoute = hasHashRoute ? currentHashRoute : routePath + l.search;
      var nextUrl = l.origin + (repoBase || "") + "/#" + nextRoute;

      l.replace(nextUrl);
    })();
  </script>
  <script type="text/javascript">
    (function () {
      var repoName = "saju-frontend-prototype";
      var l = window.location;
      var isGitHubPagesHost = /\.github\.io$/i.test(l.hostname);
      var pathParts = (l.pathname || "/").split("/");
      var repoBase = isGitHubPagesHost && pathParts[1] === repoName
        ? "/" + repoName + "/"
        : "/";
      var base = document.createElement("base");
      base.href = repoBase;
      document.head.appendChild(base);
    })();
  </script>
