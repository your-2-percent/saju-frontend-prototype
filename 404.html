<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>Hwarim Manse</title>
    <script type="text/javascript">
      // Support both the custom domain and the GitHub Pages project URL.
      (function () {
        var repoName = "saju-frontend-prototype";
        var l = window.location;
        var isGitHubPagesHost = /\.github\.io$/i.test(l.hostname);
        var isProjectPath =
          l.pathname === "/" + repoName ||
          l.pathname.indexOf("/" + repoName + "/") === 0;
        var segmentCount = isGitHubPagesHost && isProjectPath ? 1 : 0;
        var repoBase = l.pathname.split("/").slice(0, 1 + segmentCount).join("/");
        var routePath = l.pathname
          .slice(1)
          .split("/")
          .slice(segmentCount)
          .join("/")
          .replace(/&/g, "~and~");
        var search = l.search ? "&q=" + l.search.slice(1).replace(/&/g, "~and~") : "";

        l.replace(
          l.protocol +
            "//" +
            l.hostname +
            (l.port ? ":" + l.port : "") +
            repoBase +
            "/?p=/" +
            routePath +
            search +
            l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
